<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faujiadda — Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --navy:   #0b1325;
            --navy2:  #111d36;
            --navy3:  #1a2642;
            --border: rgba(42, 59, 92, 0.65);
            --accent: #FF9933;
            --green:  #22c55e;
            --red:    #f43f5e;
            --amber:  #f59e0b;
            --sky:    #38bdf8;
            --white:  #ffffff;
            --muted:  #a0aec0;
            --muted2: #64748b;
            --glass:  blur(12px);
        }

        html { scroll-behavior: smooth; }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--navy);
            color: var(--white);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Background texture ── */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none; z-index: 0; opacity: 0.4;
        }

        /* ════════════════════════════════════════
           LOGIN SCREEN
        ════════════════════════════════════════ */
        #login-screen {
            position: relative; z-index: 1;
            max-width: 380px; margin: 80px auto;
            background: var(--navy2);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px 36px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.5);
            text-align: center;
        }
        #login-screen .shield { font-size: 52px; margin-bottom: 16px; }
        #login-screen h2 {
            font-family: 'Playfair Display', serif;
            font-size: 26px; margin-bottom: 8px;
        }
        #login-screen p {
            color: var(--muted); font-size: 13px; margin-bottom: 32px;
        }
        .login-field {
            position: relative; margin-bottom: 16px;
        }
        .login-field input {
            width: 100%; padding: 14px 16px;
            background: var(--navy3);
            border: 1px solid var(--border);
            color: var(--white); border-radius: 12px;
            font-family: 'Outfit', sans-serif; font-size: 15px;
            transition: border-color 0.2s;
            outline: none;
        }
        .login-field input:focus { border-color: var(--accent); }
        .login-field input::placeholder { color: var(--muted2); }
        #login-btn {
            width: 100%; padding: 14px;
            background: var(--accent); color: #000;
            border: none; border-radius: 12px;
            font-family: 'Outfit', sans-serif;
            font-size: 16px; font-weight: 800;
            cursor: pointer; margin-top: 8px;
            transition: all 0.2s;
        }
        #login-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255,153,51,0.3); }
        #login-error {
            color: var(--red); font-size: 13px;
            margin-top: 14px; display: none;
            background: rgba(244,63,94,0.1);
            border: 1px solid rgba(244,63,94,0.25);
            padding: 10px; border-radius: 8px;
        }

        /* ════════════════════════════════════════
           DASHBOARD LAYOUT
        ════════════════════════════════════════ */
        #dashboard-screen { display: none; position: relative; z-index: 1; }

        /* ── Top Bar ── */
        .topbar {
            position: sticky; top: 0; z-index: 100;
            background: rgba(11,19,37,0.95);
            backdrop-filter: var(--glass);
            border-bottom: 1px solid var(--border);
            padding: 16px 32px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .topbar-logo {
            font-family: 'Playfair Display', serif;
            font-size: 22px; font-weight: 700;
        }
        .topbar-logo span { color: var(--accent); }
        .topbar-badge {
            background: rgba(244, 63, 94, 0.15);
            color: var(--red);
            border: 1px solid rgba(244,63,94,0.3);
            font-size: 11px; font-weight: 700;
            padding: 3px 10px; border-radius: 100px;
            margin-left: 10px; letter-spacing: 0.05em;
        }
        .topbar-right { display: flex; align-items: center; gap: 12px; }
        .topbar-tag {
            font-size: 13px; color: var(--muted);
            display: flex; align-items: center; gap: 6px;
        }
        .topbar-tag .live-dot {
            width: 7px; height: 7px; background: var(--green);
            border-radius: 50%; animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(34,197,94,0.4); }
            50% { box-shadow: 0 0 0 6px rgba(34,197,94,0); }
        }
        .btn-sm {
            padding: 8px 16px; border-radius: 8px;
            font-size: 13px; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
            font-family: 'Outfit', sans-serif;
        }
        .btn-logout {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
        }
        .btn-logout:hover { border-color: var(--red); color: var(--red); }
        .btn-back {
            background: transparent;
            border: 1px solid rgba(255,153,51,0.3);
            color: var(--accent); text-decoration: none;
            padding: 8px 16px; border-radius: 8px;
            font-size: 13px; font-weight: 600;
        }
        .btn-back:hover { background: rgba(255,153,51,0.1); }

        /* ── Main Content ── */
        .content { max-width: 1280px; margin: 0 auto; padding: 32px 24px; }

        /* ── Stats Row ── */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px; margin-bottom: 32px;
        }
        .stat-card {
            background: var(--navy2);
            border: 1px solid var(--border);
            border-radius: 16px; padding: 20px 22px;
            position: relative; overflow: hidden;
            transition: border-color 0.2s;
        }
        .stat-card:hover { border-color: rgba(255,153,51,0.3); }
        .stat-card .s-icon { font-size: 24px; margin-bottom: 10px; }
        .stat-card .s-val {
            font-size: 32px; font-weight: 800;
            font-family: 'Playfair Display', serif;
            line-height: 1;
        }
        .stat-card .s-label {
            font-size: 12px; color: var(--muted);
            margin-top: 4px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.06em;
        }
        .stat-card.s-pending .s-val { color: var(--amber); }
        .stat-card.s-verified .s-val { color: var(--green); }
        .stat-card.s-reported .s-val { color: var(--red); }
        .stat-card.s-total .s-val { color: var(--sky); }

        /* ── Tabs ── */
        .tabs { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
        .tab {
            padding: 9px 20px; border-radius: 100px;
            font-size: 13px; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
            border: 1px solid var(--border);
            background: transparent; color: var(--muted);
            font-family: 'Outfit', sans-serif;
        }
        .tab:hover { border-color: var(--accent); color: var(--white); }
        .tab.active {
            background: var(--accent); color: #000;
            border-color: var(--accent);
        }
        .tab .tab-count {
            background: rgba(0,0,0,0.2);
            border-radius: 100px; padding: 1px 7px;
            font-size: 11px; margin-left: 5px;
        }
        .tab.active .tab-count { background: rgba(0,0,0,0.3); }

        /* ── Search bar ── */
        .search-bar {
            margin-bottom: 24px;
        }
        #admin-search {
            width: 100%; max-width: 440px;
            padding: 11px 16px;
            background: var(--navy2);
            border: 1px solid var(--border);
            color: var(--white); border-radius: 12px;
            font-family: 'Outfit', sans-serif; font-size: 14px;
            outline: none; transition: border-color 0.2s;
        }
        #admin-search:focus { border-color: var(--accent); }
        #admin-search::placeholder { color: var(--muted2); }

        /* ── Listing Grid ── */
        .listing-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 20px;
        }

        /* ── Listing Card ── */
        .lc {
            background: var(--navy2);
            border: 1px solid var(--border);
            border-radius: 18px;
            overflow: hidden;
            transition: border-color 0.2s, transform 0.2s;
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:none; } }
        .lc:hover { border-color: rgba(255,153,51,0.35); transform: translateY(-2px); }
        .lc.reported { border-color: rgba(244,63,94,0.35); }
        .lc.verified-card { border-color: rgba(34,197,94,0.25); }

        /* Photo gallery strip */
        .lc-photos {
            display: flex; gap: 4px;
            overflow-x: auto; height: 130px;
            background: #0a0f1f;
            scrollbar-width: none;
        }
        .lc-photos::-webkit-scrollbar { display: none; }
        .lc-photos img, .lc-photos video {
            height: 100%; width: auto; min-width: 120px;
            object-fit: cover; flex-shrink: 0;
            cursor: pointer; transition: filter 0.2s;
        }
        .lc-photos img:hover { filter: brightness(1.1); }
        .no-media {
            height: 80px; display: flex; align-items: center; justify-content: center;
            color: var(--muted2); font-size: 13px; font-style: italic;
            background: var(--navy3);
        }

        /* Card body */
        .lc-body { padding: 16px; }
        .lc-header {
            display: flex; justify-content: space-between;
            align-items: flex-start; gap: 8px; margin-bottom: 8px;
        }
        .lc-name {
            font-size: 15px; font-weight: 700; line-height: 1.3;
        }
        .lc-price {
            font-size: 16px; font-weight: 800; color: var(--accent);
            white-space: nowrap;
        }
        .badge {
            display: inline-flex; align-items: center; gap: 4px;
            font-size: 11px; font-weight: 700;
            padding: 3px 9px; border-radius: 100px;
            letter-spacing: 0.03em;
        }
        .badge-pending { background: rgba(245,158,11,.12); color: var(--amber); border: 1px solid rgba(245,158,11,.3); }
        .badge-verified { background: rgba(34,197,94,.12); color: var(--green); border: 1px solid rgba(34,197,94,.3); }
        .badge-reported { background: rgba(244,63,94,.12); color: var(--red); border: 1px solid rgba(244,63,94,.3); }

        .lc-meta { font-size: 12px; color: var(--muted); line-height: 1.8; margin-bottom: 12px; }
        .lc-meta strong { color: var(--white); }
        .lc-meta .report-pill {
            display: inline-flex; align-items: center; gap: 4px;
            background: rgba(244,63,94,0.1); color: var(--red);
            border: 1px solid rgba(244,63,94,0.25);
            padding: 2px 8px; border-radius: 100px;
            font-size: 11px; font-weight: 600;
        }

        /* Copy number button */
        .copy-btn {
            background: rgba(56,189,248,0.1); color: var(--sky);
            border: 1px solid rgba(56,189,248,0.25);
            padding: 2px 9px; border-radius: 6px;
            font-size: 11px; font-weight: 600;
            cursor: pointer; font-family: 'Outfit', sans-serif;
            transition: background 0.2s;
        }
        .copy-btn:hover { background: rgba(56,189,248,0.2); }

        /* Actions */
        .lc-actions { display: flex; gap: 8px; margin-top: 4px; }
        .btn-approve {
            flex: 1; padding: 10px;
            background: rgba(34,197,94,0.12); color: var(--green);
            border: 1px solid rgba(34,197,94,0.3);
            border-radius: 10px; font-weight: 700; font-size: 13px;
            cursor: pointer; font-family: 'Outfit', sans-serif;
            transition: all 0.2s;
        }
        .btn-approve:hover { background: rgba(34,197,94,0.22); }
        .btn-approve:disabled { opacity: 0.4; cursor: default; }
        .btn-delete {
            flex: 1; padding: 10px;
            background: rgba(244,63,94,0.1); color: var(--red);
            border: 1px solid rgba(244,63,94,0.25);
            border-radius: 10px; font-weight: 700; font-size: 13px;
            cursor: pointer; font-family: 'Outfit', sans-serif;
            transition: all 0.2s;
        }
        .btn-delete:hover { background: rgba(244,63,94,0.2); }

        /* Empty state */
        .empty-state {
            text-align: center; padding: 64px 24px;
            color: var(--muted); grid-column: 1 / -1;
        }
        .empty-state .e-icon { font-size: 48px; margin-bottom: 12px; }
        .empty-state h3 { font-size: 18px; margin-bottom: 6px; color: var(--white); }

        /* Loading skeleton */
        .skel {
            background: var(--navy2); border: 1px solid var(--border);
            border-radius: 18px; overflow: hidden;
        }
        .skel-ph { height: 130px; background: var(--navy3); animation: shimmer 1.4s linear infinite; }
        .skel-body { padding: 16px; }
        .skel-line { height: 12px; background: var(--navy3); border-radius: 6px; margin-bottom: 8px; animation: shimmer 1.4s linear infinite; }
        @keyframes shimmer { 0%,100% { opacity:0.5; } 50% { opacity:1; } }

        /* Toast */
        #toast {
            position: fixed; bottom: 24px; left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--navy2); border: 1px solid var(--border);
            color: var(--white); padding: 12px 24px;
            border-radius: 100px; font-size: 14px; font-weight: 600;
            z-index: 9999; transition: transform 0.3s ease;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            white-space: nowrap;
        }
        #toast.show { transform: translateX(-50%) translateY(0); }

        @media (max-width: 600px) {
            .topbar { padding: 12px 16px; }
            .content { padding: 16px 12px; }
            .topbar-logo span + * { display: none; }
            .listing-grid { grid-template-columns: 1fr; }
            .stats-row { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<div id="toast"></div>

<!-- ══════════════════════════════════════
     LOGIN SCREEN
══════════════════════════════════════ -->
<div id="login-screen">
    <div class="shield">🛡️</div>
    <h2><span style="color:var(--accent)">Fauji</span>adda Admin</h2>
    <p>Restricted access — authorised personnel only.</p>

    <div class="login-field">
        <input type="email" id="admin-email" placeholder="Admin Email" autocomplete="email">
    </div>
    <div class="login-field">
        <input type="password" id="admin-pass" placeholder="Password" autocomplete="current-password"
               onkeyup="if(event.key==='Enter') loginAdmin()">
    </div>
    <button id="login-btn" onclick="loginAdmin()">Login to Dashboard →</button>
    <div id="login-error">⚠️ Incorrect email or password. Try again.</div>
</div>

<!-- ══════════════════════════════════════
     DASHBOARD
══════════════════════════════════════ -->
<div id="dashboard-screen">

    <!-- Top Bar -->
    <div class="topbar">
        <div style="display:flex;align-items:center;gap:2px;">
            <div class="topbar-logo"><span>Fauji</span>adda</div>
            <span class="topbar-badge">ADMIN</span>
        </div>
        <div class="topbar-right">
            <div class="topbar-tag">
                <div class="live-dot"></div>
                <span id="admin-user-label" style="font-size:12px;color:var(--muted);">Connected</span>
            </div>
            <a href="app.html" class="btn-back" target="_blank">← View Map</a>
            <button class="btn-sm btn-logout" onclick="logoutAdmin()">Logout</button>
        </div>
    </div>

    <div class="content">

        <!-- Stats Row -->
        <div class="stats-row">
            <div class="stat-card s-total">
                <div class="s-icon">🗂️</div>
                <div class="s-val" id="stat-total">—</div>
                <div class="s-label">Total Listings</div>
            </div>
            <div class="stat-card s-pending">
                <div class="s-icon">⏳</div>
                <div class="s-val" id="stat-pending">—</div>
                <div class="s-label">Pending Review</div>
            </div>
            <div class="stat-card s-verified">
                <div class="s-icon">✅</div>
                <div class="s-val" id="stat-verified">—</div>
                <div class="s-label">Verified &amp; Live</div>
            </div>
            <div class="stat-card s-reported">
                <div class="s-icon">🚩</div>
                <div class="s-val" id="stat-reported">—</div>
                <div class="s-label">Reported Listings</div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" id="tab-pending"  onclick="switchTab('pending')">⏳ Pending <span class="tab-count" id="tc-pending">0</span></button>
            <button class="tab"        id="tab-reported" onclick="switchTab('reported')">🚩 Reported <span class="tab-count" id="tc-reported">0</span></button>
            <button class="tab"        id="tab-all"      onclick="switchTab('all')">🗂️ All <span class="tab-count" id="tc-all">0</span></button>
            <button class="tab"        id="tab-verified" onclick="switchTab('verified')">✅ Verified <span class="tab-count" id="tc-verified">0</span></button>
        </div>

        <!-- Search -->
        <div class="search-bar">
            <input type="search" id="admin-search" placeholder="🔍  Search by name, city, area…" oninput="filterCards()">
        </div>

        <!-- Listing Grid -->
        <div class="listing-grid" id="listing-grid">
            <!-- Skeleton placeholders -->
            <div class="skel"><div class="skel-ph"></div><div class="skel-body"><div class="skel-line" style="width:70%"></div><div class="skel-line" style="width:50%"></div><div class="skel-line" style="width:85%"></div></div></div>
            <div class="skel"><div class="skel-ph"></div><div class="skel-body"><div class="skel-line" style="width:60%"></div><div class="skel-line" style="width:80%"></div><div class="skel-line" style="width:45%"></div></div></div>
            <div class="skel"><div class="skel-ph"></div><div class="skel-body"><div class="skel-line" style="width:75%"></div><div class="skel-line" style="width:55%"></div><div class="skel-line" style="width:90%"></div></div></div>
        </div>

    </div><!-- /content -->
</div><!-- /dashboard -->

<script type="module">
import { initializeApp }    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, query, orderBy }
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut }
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

/* ── Firebase Init ── */
const firebaseConfig = {
    apiKey: "AIzaSyCKMzqMBkRBOc9XJ1fDrH3LZ4HfltWVDmA",
    authDomain: "rentmap-live.firebaseapp.com",
    projectId: "rentmap-live",
    storageBucket: "rentmap-live.firebasestorage.app",
    messagingSenderId: "1018484183886",
    appId: "1:1018484183886:web:b8e8236196e434187d041f"
};
const app  = initializeApp(firebaseConfig);
const db   = getFirestore(app);
const auth = getAuth(app);

/* ── State ── */
let allListings = [];
let currentTab  = 'pending';
let unsubscribe = null;

/* ── Auth ── */
onAuthStateChanged(auth, user => {
    if (user) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('dashboard-screen').style.display = 'block';
        document.getElementById('admin-user-label').textContent = user.email;
        loadAllListings();
    } else {
        document.getElementById('login-screen').style.display = 'block';
        document.getElementById('dashboard-screen').style.display = 'none';
        if (unsubscribe) { unsubscribe(); unsubscribe = null; }
    }
});

/* ── Login ── */
window.loginAdmin = async () => {
    const email = document.getElementById('admin-email').value.trim();
    const pass  = document.getElementById('admin-pass').value;
    const btn   = document.getElementById('login-btn');
    const err   = document.getElementById('login-error');
    if (!email || !pass) { err.textContent = '⚠️ Please enter email and password.'; err.style.display='block'; return; }
    btn.textContent = 'Verifying… ⏳'; btn.disabled = true;
    err.style.display = 'none';
    try {
        await signInWithEmailAndPassword(auth, email, pass);
    } catch(e) {
        err.textContent = '⚠️ ' + (e.code === 'auth/wrong-password' || e.code === 'auth/user-not-found' ? 'Wrong email or password.' : e.message);
        err.style.display = 'block';
    }
    btn.textContent = 'Login to Dashboard →'; btn.disabled = false;
};

window.logoutAdmin = () => signOut(auth);

/* ── Load listings (real-time) ── */
function loadAllListings() {
    const q = query(collection(db, 'rentals'), orderBy('createdAt', 'desc'));
    unsubscribe = onSnapshot(q, snapshot => {
        allListings = [];
        snapshot.forEach(d => allListings.push({ id: d.id, ...d.data() }));
        updateStats();
        renderTab();
    });
}

/* ── Stats ── */
function updateStats() {
    const total    = allListings.length;
    const pending  = allListings.filter(r => !r.verified).length;
    const verified = allListings.filter(r => r.verified).length;
    const reported = allListings.filter(r => (r.reportCount || 0) >= 1).length;

    document.getElementById('stat-total').textContent    = total;
    document.getElementById('stat-pending').textContent  = pending;
    document.getElementById('stat-verified').textContent = verified;
    document.getElementById('stat-reported').textContent = reported;

    document.getElementById('tc-pending').textContent  = pending;
    document.getElementById('tc-reported').textContent = reported;
    document.getElementById('tc-all').textContent      = total;
    document.getElementById('tc-verified').textContent = verified;
}

/* ── Tabs ── */
window.switchTab = tab => {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    document.getElementById('admin-search').value = '';
    renderTab();
};

function renderTab() {
    const q = document.getElementById('admin-search').value.toLowerCase();
    let list = allListings;

    if (currentTab === 'pending')  list = list.filter(r => !r.verified);
    if (currentTab === 'verified') list = list.filter(r => r.verified);
    if (currentTab === 'reported') list = list.filter(r => (r.reportCount || 0) >= 1);

    if (q) list = list.filter(r =>
        (r.name  || '').toLowerCase().includes(q) ||
        (r.city  || '').toLowerCase().includes(q) ||
        (r.area  || '').toLowerCase().includes(q) ||
        (r.whatsapp || '').includes(q)
    );

    const grid = document.getElementById('listing-grid');
    grid.innerHTML = '';

    if (!list.length) {
        grid.innerHTML = `<div class="empty-state">
            <div class="e-icon">${currentTab==='pending'?'🎉':'🔍'}</div>
            <h3>${currentTab==='pending'?'All caught up!':'No listings found'}</h3>
            <p>${currentTab==='pending'?'No pending listings to review.':'Try a different search or tab.'}</p>
        </div>`;
        return;
    }

    list.forEach(r => grid.appendChild(buildCard(r)));
}

window.filterCards = () => renderTab();

/* ── Build Card ── */
function buildCard(r) {
    const card = document.createElement('div');
    card.className = 'lc' + (r.verified ? ' verified-card' : '') + ((r.reportCount||0)>=1 ? ' reported' : '');
    card.id = 'card-' + r.id;

    /* Date */
    let dateStr = 'Unknown date';
    if (r.createdAt) {
        const d = new Date(r.createdAt);
        const ago = Math.floor((Date.now() - r.createdAt) / 86400000);
        dateStr = ago === 0 ? 'Today' : ago === 1 ? 'Yesterday' : `${ago}d ago`;
        dateStr += ` · ${d.toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' })}`;
    }

    /* Status badge */
    const statusBadge = r.verified
        ? `<span class="badge badge-verified">✅ Verified</span>`
        : `<span class="badge badge-pending">⏳ Pending</span>`;

    /* Report badge */
    const reportBadge = (r.reportCount||0) >= 1
        ? `<span class="report-pill">🚩 ${r.reportCount} report${r.reportCount>1?'s':''}</span>`
        : '';

    /* Media */
    let mediaHtml = '';
    if (r.mediaUrls?.length > 0) {
        mediaHtml = `<div class="lc-photos">`;
        r.mediaUrls.forEach(url => {
            if (url.match(/\.(mp4|mov|webm)$/i)) {
                mediaHtml += `<video src="${url}" style="height:100%;border-radius:0;" controls></video>`;
            } else {
                mediaHtml += `<img src="${url}" alt="listing photo" onclick="window.open('${url}','_blank')" title="Open full size">`;
            }
        });
        mediaHtml += `</div>`;
    } else {
        mediaHtml = `<div class="no-media">📷 No photos uploaded</div>`;
    }

    /* BAH colour */
    const bahColor = (r.price||0) <= 15000 ? '#22c55e' : (r.price||0) <= 30000 ? '#f59e0b' : '#f43f5e';
    const bahText  = (r.price||0) <= 15000 ? 'OR Limit' : (r.price||0) <= 30000 ? 'JCO Limit' : 'Officer';

    card.innerHTML = `
    ${mediaHtml}
    <div class="lc-body">
        <div class="lc-header">
            <div class="lc-name">${r.name || 'Untitled Listing'}</div>
            <div class="lc-price">₹${(r.price||0).toLocaleString()}<span style="font-size:11px;color:var(--muted);font-weight:400;">/mo</span></div>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;">
            ${statusBadge}
            ${reportBadge}
            <span class="badge" style="background:rgba(255,255,255,0.06);color:var(--muted);border-color:var(--border);">${(r.type||'—').toUpperCase()}</span>
            <span class="badge" style="color:${bahColor};background:${bahColor}18;border-color:${bahColor}60;">${bahText}</span>
        </div>
        <div class="lc-meta">
            <div>📍 <strong>${r.area||'—'}</strong>, ${r.city||'—'}</div>
            <div>📞 <strong>${r.whatsapp||'—'}</strong>
                ${r.whatsapp ? `<button class="copy-btn" onclick="copyNum('${r.whatsapp}')">Copy</button>` : ''}
                ${r.whatsapp ? `<a href="https://wa.me/91${r.whatsapp}" target="_blank" style="margin-left:6px;font-size:11px;color:#25D366;font-weight:600;text-decoration:none;">WhatsApp ↗</a>` : ''}
            </div>
            <div>🏠 ${r.sqft||'—'} sq.ft · ${r.furnishing||r.furnish||'—'} · Floor ${r.floor||'—'}</div>
            <div>📅 Available: <strong>${r.available||'Immediate'}</strong></div>
            <div>🕐 Posted: ${dateStr}</div>
            ${(r.reportCount||0)>=1 ? `<div>🚩 Reports: <strong style="color:var(--red);">${r.reportCount}</strong></div>` : ''}
            ${r.uid ? `<div style="font-size:11px;color:var(--muted2);">UID: ${r.uid}</div>` : ''}
        </div>
        <div class="lc-actions">
            <button class="btn-approve" onclick="approveListing('${r.id}')" ${r.verified?'disabled title="Already verified"':''}>
                ${r.verified ? '✅ Live' : '✓ Approve & Publish'}
            </button>
            <button class="btn-delete" onclick="deleteListing('${r.id}', '${(r.name||'this listing').replace(/'/g,"\\'")}')">
                🗑 Delete
            </button>
        </div>
    </div>`;

    return card;
}

/* ── Approve ── */
window.approveListing = async (id) => {
    if (!confirm('✅ Approve this listing and make it LIVE on the public map?')) return;
    try {
        await updateDoc(doc(db, 'rentals', id), { verified: true });
        showToast('✅ Listing approved and published!');
    } catch(e) { showToast('❌ Error: ' + e.message); }
};

/* ── Delete ── */
window.deleteListing = async (id, name) => {
    if (!confirm(`🗑 Permanently delete "${name}"?\n\nThis cannot be undone.`)) return;
    try {
        await deleteDoc(doc(db, 'rentals', id));
        showToast('🗑 Listing deleted.');
    } catch(e) { showToast('❌ Error: ' + e.message); }
};

/* ── Copy number ── */
window.copyNum = (num) => {
    navigator.clipboard?.writeText(num).then(() => showToast('📋 Number copied!'));
};

/* ── Toast ── */
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
