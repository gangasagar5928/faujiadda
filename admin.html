<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Rent Map</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { padding: 20px; overflow-y: auto; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .grid { display: grid; gap: 15px; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }
        .card { background: var(--card); padding: 15px; border-radius: 10px; border: 1px solid var(--border); }
        .card-actions { display: flex; gap: 10px; margin-top: 15px; }
        .btn-approve { background: var(--green); color: #000; padding: 8px; border: none; border-radius: 5px; cursor: pointer; flex: 1; font-weight: bold; }
        .btn-delete { background: #fc5c7d; color: #fff; padding: 8px; border: none; border-radius: 5px; cursor: pointer; flex: 1; font-weight: bold; }
        .badge-pending { color: #fb923c; font-size: 12px; border: 1px solid #fb923c; padding: 2px 6px; border-radius: 4px; }

        /* New Login Styles */
        #login-screen { max-width: 320px; margin: 80px auto; text-align: center; background: var(--panel); padding: 30px; border-radius: 15px; border: 1px solid var(--border); }
        #login-screen input { width: 100%; padding: 12px; margin-bottom: 15px; background: var(--card); border: 1px solid var(--border); color: white; border-radius: 8px; font-family: inherit; }
        #login-screen button { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-family: inherit; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2 style="margin-bottom: 20px; color: var(--accent);">Admin Login 🔐</h2>
        <input type="email" id="admin-email" placeholder="Email Address">
        <input type="password" id="admin-pass" placeholder="Password">
        <button onclick="loginAdmin()">Login to Dashboard</button>
        <p id="login-error" style="color: #fc5c7d; margin-top: 15px; font-size: 13px; display: none;">Wrong email or password.</p>
    </div>

    <div id="dashboard-screen" style="display: none;">
        <div class="admin-header">
            <h1>Admin Dashboard 🛡️</h1>
            <div>
                <button onclick="logoutAdmin()" style="background: transparent; border: 1px solid var(--border); color: var(--text); padding: 5px 12px; border-radius: 5px; cursor: pointer; margin-right: 15px;">Logout</button>
                <a href="index.html" style="color: var(--accent); text-decoration: none;">&larr; Back to Map</a>
            </div>
        </div>

        <h2 style="margin-bottom: 15px; color: var(--muted);">Pending Approvals</h2>
        <div id="pending-list" class="grid">
            </div>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
